<svg width="1600" height="440" viewBox="0 0 1600 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Reviva Cover Grid</title>
  <desc id="desc">Grid and terminal styled banner for Reviva.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#000"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="card" x1="200" y1="120" x2="1400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="440" rx="16" fill="url(#card)" stroke="#454a52" stroke-width="2"/>
  <circle cx="20" cy="20" r="6" fill="#FB7185"/>
  <circle cx="40" cy="20" r="6" fill="#FBBF24"/>
  <circle cx="60" cy="20" r="6" fill="#34D399"/>

  <text x="60" y="180" font-family="JetBrains Mono, Consolas, Menlo, monospace" font-size="16" fill="#60A5FA">
    prompt_preview hash: 5fa2f4ab...
  </text>
  <text x="60" y="204" font-family="JetBrains Mono, Consolas, Menlo, monospace" font-size="16" fill="#22D3EE">
    backend: http://127.0.0.1:8080  model: local
  </text>
  <text x="60" y="228" font-family="JetBrains Mono, Consolas, Menlo, monospace" font-size="16" fill="#A7F3D0">
    normalization_state: structured | partial | raw_only
  </text>

  <text x="60" y="340" font-family="JetBrains Mono, Consolas, Menlo, monospace" font-size="64" font-weight="100" fill="#F8FAFC">Reviva</text>
  <text x="60" y="377" font-family="JetBrains Mono, Consolas, Menlo, monospace" font-size="24" fill="#CBD5E1">
    Deterministic local review flow
  </text>
</svg>
